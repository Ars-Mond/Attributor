name: 🐛 Bug report
description: Report something that isn't working as expected
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Windows 11 / macOS 14 / Ubuntu 24.04"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Attributor version
      placeholder: "1.1.0"
    validations:
      required: true

  - type: input
    id: formats
    attributes:
      label: Image format(s) involved
      placeholder: "JPEG / PNG / WebP"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste any relevant logs, error messages, or screenshots.
    validations:
      required: false
