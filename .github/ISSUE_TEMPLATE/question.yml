name: ❓ Question
description: Ask a question about usage, setup, or behavior
title: "[Question]: "
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Your question
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to achieve? (OS, version, format, etc. if relevant)
    validations:
      required: false
